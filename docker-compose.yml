name: stock-intelligence-platform

services:
  # ========================================================================
  # PostgreSQL database
  # ========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: stock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  # ========================================================================
  # Data pipeline (runs on schedule inside the container via APScheduler)
  # ========================================================================
  data_pipeline:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: stock_data_pipeline
    restart: unless-stopped
    command: ["python", "data_pipeline.py"]
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock_network

  # ========================================================================
  # FastAPI backend
  # ========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: stock_api
    restart: unless-stopped
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      API_KEY: ${API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock_network

  # ========================================================================
  # Streamlit dashboard
  # ========================================================================
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: stock_dashboard
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      API_KEY: ${API_KEY}
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - stock_network

networks:
  stock_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
