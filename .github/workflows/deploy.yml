name: CI/CD - Test, Build, and Deploy

# Trigger this workflow on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  # ========================================================================
  # JOB 1: Run tests
  # ========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run basic smoke tests
        env:
          SQLITE_PATH: test_stocks.db
          API_KEY: test-api-key
        run: |
          pytest test_basic.py -v

  # ========================================================================
  # JOB 2: Build Docker images (validates Dockerfiles build successfully)
  # ========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FastAPI backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          tags: stock-platform-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Streamlit dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: false
          tags: stock-platform-streamlit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================================================
  # JOB 3: Deploy to Render.com
  # ========================================================================
  # Render.com supports "Deploy Hooks" - a unique URL per service that,
  # when called (e.g. via curl), triggers a new deployment using the
  # latest code from the connected GitHub repo.
  #
  # Setup required (one-time, in Render dashboard):
  #   1. Create a Web Service for the FastAPI backend (Docker runtime,
  #      Dockerfile.api) and a Web Service for Streamlit
  #      (Docker runtime, Dockerfile.streamlit).
  #   2. In each service's Settings -> "Deploy Hook", copy the URL.
  #   3. Add these URLs as GitHub repo secrets:
  #        RENDER_DEPLOY_HOOK_API
  #        RENDER_DEPLOY_HOOK_STREAMLIT
  #
  # Render automatically rebuilds the Docker image from your repo when
  # the deploy hook is called, so no image push step is needed here.
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Render deploy - FastAPI backend
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Render deploy - Streamlit dashboard
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STREAMLIT }}"
