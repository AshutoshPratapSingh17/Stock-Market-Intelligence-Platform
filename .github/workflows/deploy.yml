name: CI/CD - Test, Build, and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run basic smoke tests
        env:
          SQLITE_PATH: test_stocks.db
          API_KEY: test-api-key
        run: |
          pytest test_basic.py -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FastAPI backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          tags: stock-platform-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Streamlit dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: false
          tags: stock-platform-streamlit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trigger Render deploy - FastAPI backend
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -X POST "$HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_API not set - skipping deploy"
          fi

      - name: Trigger Render deploy - Streamlit dashboard
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_STREAMLIT }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -X POST "$HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_STREAMLIT not set - skipping deploy"
          fi
